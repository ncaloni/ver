<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geoportal Mendoza - Población y Salud</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://unpkg.com/simple-statistics@7.8.3/dist/simple-statistics.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        /* Estilos unificados para las leyendas del mapa */
        .info.legend {
            background: white; 
            padding: 12px; 
            border-radius: 8px;
            line-height: 20px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            max-width: 260px;
            color: #333;
        }
        .info.legend h4 { 
            margin: 0 0 8px; 
            font-size: 14px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 4px;
        }
        .legend-item { 
            display: flex; 
            align-items: center; 
            margin-bottom: 5px; 
            font-size: 12px;
        }
        .color-box { 
            width: 18px; 
            height: 18px; 
            margin-right: 8px; 
            opacity: 0.8; 
            border: 1px solid #fff;
        }
        .circle-marker { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            margin-right: 10px; 
            display: inline-block; 
            border: 1px solid #fff;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script>
        // ==========================================
        // 1. INICIALIZACIÓN DEL MAPA Y CAPAS BASE
        // ==========================================
        const map = L.map('map').setView([-34.6, -68.5], 7);

        // Mapa Base Claro
        const basemap = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        // Creamos los Panes para asegurar un orden estricto de renderizado en el navegador
        map.createPane('paneDepartamentos');
        map.getPane('paneDepartamentos').style.zIndex = 400; // Capa de abajo

        map.createPane('paneSalud');
        map.getPane('paneSalud').style.zIndex = 650; // Capa de arriba (puntos flotantes)

        // Inicializamos los grupos lógicos vacíos y los añadimos al mapa
        const capaGroupDeptos = L.layerGroup().addTo(map);
        const capaGroupSalud = L.layerGroup().addTo(map);

        // Variables globales para guardar las instancias de las capas GeoJSON
        let geojsonDeptos;
        let geojsonSalud;

        // ==========================================
        // 2. FUNCIÓN DE COLORES PARA DEPARTAMENTOS
        // ==========================================
        function getColorDepto(v, breaks) {
            return v <= breaks[1] ? '#fef0d9' :
                   v <= breaks[2] ? '#fdcc8a' :
                   v <= breaks[3] ? '#fc8d59' :
                   v <= breaks[4] ? '#e34a33' :
                                    '#b30000';
        }

        // ==========================================
        // 3. FUNCIÓN DE COLORES PARA CENTROS DE SALUD (Tipos reales)
        // ==========================================
        function getColorSalud(tipo) {
            if (!tipo) return '#95a5a6';
            const t = tipo.toUpperCase().trim();
            
            if (t.includes('HOSPITAL')) return '#e74c3c'; // Rojo
            if (t === 'CAPS')           return '#3498db'; // Azul
            if (t === 'CIC')            return '#2ecc71'; // Verde
            return '#95a5a6';                             // Gris (Otros/Postas)
        }

        // ==========================================
        // 4. CARGA DE DATOS: DEPARTAMENTOS
        // ==========================================
        fetch('depto_mendoza.geojson')
            .then(res => res.json())
            .then(data => {
                const valoresPoblacion = data.features.map(f => f.properties.poblacion || 0);
                const clusters = ss.ckmeans(valoresPoblacion, 5);
                const breaks = [
                    Math.min(...valoresPoblacion),
                    clusters[0][clusters[0].length - 1],
                    clusters[1][clusters[1].length - 1],
                    clusters[2][clusters[2].length - 1],
                    clusters[3][clusters[3].length - 1],
                    clusters[4][clusters[4].length - 1]
                ];

                geojsonDeptos = L.geoJSON(data, {
                    pane: 'paneDepartamentos',
                    style: function(feature) {
                        return {
                            fillColor: getColorDepto(feature.properties.poblacion || 0, breaks),
                            weight: 1.5, 
                            color: '#ffffff', 
                            fillOpacity: 0.7
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        const nombre = feature.properties.NAM || feature.properties.departamento || "Desconocido";
                        const pob = (feature.properties.poblacion || 0).toLocaleString('es-AR');
                        layer.bindPopup(`<b>Departamento:</b> ${nombre}<br><b>Población:</b> ${pob} hab.`);
                        
                        layer.on({
                            mouseover: e => { e.target.setStyle({ weight: 3, color: '#666', fillOpacity: 0.8 }); },
                            mouseout: e => { geojsonDeptos.resetStyle(e.target); }
                        });
                    }
                });

                capaGroupDeptos.addLayer(geojsonDeptos);
                
                // Generar leyenda una vez calculados los cortes
                crearLeyendaDeptos(breaks);
            })
            .catch(err => console.error("Error cargando departamentos:", err));
